<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Plutopia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="contact-page">
    <header class="header scrolled" id="main-header">
        <a href="index.html" class="logo-link"><img src="assets/logo.jpg" alt="Plutopia Logo" class="logo-img"></a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="work.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <main class="contact-main">
        <div class="contact-container">
            <h1 class="contact-title">Contact Us</h1>
            <p class="contact-subtitle">Get in touch with Plutopia. Fill out the form below for inquiries about original IP, collaborations, and more.</p>
            
            <form action="#" class="contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name *</label>
                        <input type="text" id="first-name" required>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name *</label>
                        <input type="text" id="last-name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5"></textarea>
                </div>

                <button type="submit" class="contact-submit">SUBMIT</button>
            </form>

            <div class="contact-email">
                <a href="mailto:ThePlutopiaWorld@gmail.com">ThePlutopiaWorld@gmail.com</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
